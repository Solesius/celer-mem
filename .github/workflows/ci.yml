name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libsqlite3-dev \
            librocksdb-dev \
            libqpdf-dev \
            ninja-build \
            pkg-config

      - name: Configure
        run: >-
          cmake -S . -B build -G Ninja
          -DCELER_BUILD_TESTS=ON
          -DCELER_BUILD_EXAMPLES=OFF
          -DCELER_BUILD_S3=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Run tests
        run: ctest --test-dir build --output-on-failure

      - name: Check headers
        run: make check-headers

  coverage:
    runs-on: ubuntu-24.04
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            lcov \
            libsqlite3-dev \
            librocksdb-dev \
            libqpdf-dev \
            ninja-build \
            pkg-config

      - name: Configure coverage build
        run: >-
          cmake -S . -B build -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCELER_BUILD_TESTS=ON
          -DCELER_BUILD_EXAMPLES=OFF
          -DCELER_BUILD_S3=OFF
          -DCELER_ENABLE_COVERAGE=ON

      - name: Generate HTML coverage report
        run: cmake --build build --target coverage --parallel

      - name: Assemble Pages site (HTML + lcov.info + badge)
        run: |
          set -euo pipefail
          site=build/coverage/site
          mkdir -p "$site"

          # Copy the genhtml report to the site root (index.html + assets).
          cp -R build/coverage/html/. "$site"/

          # Expose the raw lcov tracefile for downstream consumers (Codecov,
          # Coveralls, local tooling, etc.).
          cp build/coverage/coverage.filtered.info "$site"/lcov.info

          # Extract the line-coverage percentage from the filtered tracefile
          # so we can publish a shields.io endpoint badge.
          summary=$(lcov --summary build/coverage/coverage.filtered.info 2>&1 | tee /dev/stderr)
          pct=$(printf '%s\n' "$summary" \
            | awk '/lines\.+:/ { for (i=1; i<=NF; i++) if ($i ~ /%$/) { sub(/%$/, "", $i); print $i; exit } }')

          if [ -z "$pct" ]; then
            echo "Unable to parse line coverage percentage from lcov summary" >&2
            exit 1
          fi

          # Pick a shields.io color based on the percentage.
          color=red
          awk_pct=$(printf '%s' "$pct")
          if   awk "BEGIN { exit !($awk_pct >= 90) }"; then color=brightgreen
          elif awk "BEGIN { exit !($awk_pct >= 80) }"; then color=green
          elif awk "BEGIN { exit !($awk_pct >= 70) }"; then color=yellowgreen
          elif awk "BEGIN { exit !($awk_pct >= 60) }"; then color=yellow
          elif awk "BEGIN { exit !($awk_pct >= 50) }"; then color=orange
          fi

          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' \
            "$pct" "$color" > "$site"/badge.json

          echo "Coverage: ${pct}% (${color})"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: build/coverage/site

      - name: Upload lcov tracefile artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: build/coverage/coverage.filtered.info

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/coverage/site

  deploy-coverage:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: coverage
    permissions:
      contents: read
      id-token: write
      pages: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/configure-pages@v5
      - id: deployment
        uses: actions/deploy-pages@v4
